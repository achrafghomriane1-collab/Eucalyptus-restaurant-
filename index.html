<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>استراحة الكاليتوسة</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="page1" class="page">
        <h1>مرحباً بكم في استراحة الكاليتوسة</h1>
        <button onclick="showPage('page2')">اضغط هنا للبدء</button>
    </div>

    <div id="page2" class="page" style="display:none;">
        <h2>يرجى إدخال رقم الطاولة</h2>
        <input type="number" id="table-number" placeholder="رقم الطاولة">
        <button onclick="showPage('page3')">استمرار</button>
    </div>

    <div id="page3" class="page" style="display:none;">
        <div id="category-buttons"></div>
        <div id="category-items"></div>
        <div id="cart-footer" onclick="toggleCart()">إجمالي الطلب: <span id="total-price">0</span> DA</div>
    </div>

    <div id="cart-modal" style="display:none;">
        <div id="cart-items"></div>
        <button onclick="sendOrder()" id="send-btn">إرسال الطلب</button>
        <p id="msg" style="display:none;">تم استلام طلبك بنجاح! يرجى الانتظار، سيصلك طلبك قريباً.</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
